name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pms-app
    env:
      # Placeholders — no code connects to these at build/test time.
      # Prisma generate only parses the URL; Next static analysis reads envs but doesn't call out.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?pgbouncer=true&connection_limit=10&pool_timeout=20"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/db"
      NEXTAUTH_SECRET: "ci-placeholder-secret"
      NEXTAUTH_URL: "http://localhost:3000"
      SUPABASE_URL: "https://ci-placeholder.supabase.co"
      SUPABASE_SERVICE_ROLE_KEY: "ci-placeholder-key"
      CRON_SECRET: "ci-placeholder-cron"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: pms-app/package-lock.json

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
